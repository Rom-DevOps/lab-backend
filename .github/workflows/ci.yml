# CI — build + push the BACKEND image (app-backend) to ECR via OIDC.
# Auth uses OIDC: the workflow assumes an IAM role for temporary credentials (NO static Access Key).
# CI only builds + pushes; it does NOT deploy. Deploy is handled by the lab-gitops repo (ArgoCD GitOps):
# bump image.backend.tag in lab-gitops -> commit -> ArgoCD syncs.
#
# TODO (GitOps loop): to fully close the loop automatically, a follow-up step could bump
# image.backend.tag in the lab-gitops repo to ${{ github.sha }} (commit + push cross-repo).
# That needs a cross-repo write token stored as a secret (e.g. GITOPS_TOKEN). Left as a
# documented TODO on purpose — an untested token flow is not implemented here.
name: CI

on:
  push:
    branches: [main]
    # Skip doc-only changes -> avoid useless image builds.
    paths-ignore:
      - "**/*.md"
  workflow_dispatch: {} # allow manual run from the Actions tab

# REQUIRED for OIDC: id-token: write lets the job request the token; contents: read for checkout.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Assume the IAM role via OIDC -> temporary credentials (NO static Access Key).
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # docker login to ECR with the temporary credentials above. Output 'registry' = $ECR.
      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --platform linux/amd64: EKS nodes are amd64; missing it can cause 'exec format error'.
      # Build context is the repo root (".") since the source lives at the repo root.
      - name: Build and push
        env:
          ECR: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR/app-backend:${{ github.sha }} \
            .
          docker push $ECR/app-backend:${{ github.sha }}
