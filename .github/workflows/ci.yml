# CI — build + push image BACKEND (app-backend) len Docker Hub.
# Xac thuc bang 2 secret cua repo: DOCKERHUB_USERNAME + DOCKERHUB_TOKEN
# (Access Token Docker Hub, quyen Read & Write). KHONG luu Access Key tinh nao.
# CI chi build + push; KHONG deploy. Deploy do GitOps (ArgoCD) lo:
# ghim tag image trong lab-gitops -> commit -> ArgoCD sync.
name: CI

on:
  push:
    branches: [main]
    # Bo qua thay doi chi la tai lieu -> khoi build vo ich.
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [main]
  workflow_dispatch: {} # cho phep chay tay tu tab Actions

jobs:
  # Chan loi som: soi Dockerfile bang hadolint (chi muc *error* moi lam fail).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  build-and-push:
    needs: lint # chi build khi lint xanh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Khong khai 'registry:' -> mac dinh dang nhap Docker Hub. Khoa doc tu secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tu sinh tag: sha-<short> (bat bien, moi commit 1 tag) + latest (chi tren main).
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/app-backend
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # --platform linux/amd64: node EKS la amd64; quen co the gay 'exec format error'.
      # PR chi build de kiem tra, KHONG push (push=false khi event la pull_request).
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
